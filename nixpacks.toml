[phases.setup]
nixPkgs = [
  "php84",
  "php84Packages.composer",
  "nodejs_20",
  "nodePackages.npm"
]

[phases.build]
cmds = [
  "composer install --no-dev --optimize-autoloader",
  "npm ci",
  "npm run build",
  "php artisan config:clear",
  "php artisan route:clear",
  "php artisan view:clear"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"