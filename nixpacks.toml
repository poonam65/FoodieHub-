[phases.setup]
nixPkgs = [
  "php84",
  "php84Packages.composer",
  "nodejs_22"
]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader",
  "npm ci",
  "npm run build"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"[phases.setup]
